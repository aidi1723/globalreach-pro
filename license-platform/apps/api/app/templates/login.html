<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root {
      --bg: #f4efe4;
      --panel: #fffaf2;
      --ink: #201b16;
      --muted: #665d51;
      --brand: #0f6a62;
      --line: #dbcdb7;
      --danger: #ad3f30;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(15,106,98,0.13), transparent 36%),
        radial-gradient(circle at right bottom, rgba(18,82,125,0.10), transparent 32%),
        linear-gradient(135deg, #f5efe4 0%, #efe0c6 100%);
      color: var(--ink);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      padding: 20px;
    }
    .card {
      width: min(94vw, 430px);
      padding: 30px 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 20px 42px rgba(32, 27, 22, 0.12);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      font: inherit;
      color: var(--ink);
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px 16px;
      border: 0;
      border-radius: 12px;
      background: var(--brand);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      margin-top: 14px;
      color: var(--danger);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="/console/login">
    <h1>激活码管理后台</h1>
    <p>登录后可统一管理各项目激活码，支持生成、批量处理、状态查看、导出和备份。</p>
    <label for="email">管理员邮箱</label>
    <input id="email" name="email" type="email" autocomplete="username" required>
    <label for="password">登录密码</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">进入后台</button>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
  </form>
</body>
</html>
